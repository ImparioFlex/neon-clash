<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06060e;
  -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
  touch-action:none;position:fixed;top:0;left:0}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
'use strict';
/*
 * ════════════════════════════════════════════════════════════════
 *  NEON CLASH — Sci-fi 2D Fighting Game
 * ════════════════════════════════════════════════════════════════
 *
 *  NOVA  — Cyber Ninja (Player / Blue-Cyan)
 *    Lithe, lightning-fast operative from the Neon Sprawl.
 *    Fights with energy blades and plasma tech.
 *    Special 1  "Plasma Bolt"   (Crouch + Punch)  — horizontal energy projectile
 *    Special 2  "Neon Blade"    (Crouch + Kick)   — dashing blade slash, long range
 *
 *  TITAN — Mech Brawler (CPU / Red-Orange)
 *    Heavily armored enforcer built for close-range devastation.
 *    Augmented fists and thruster-assisted strikes.
 *    Special 1  "Seismic Slam"  (Crouch + Punch)  — ground-pound shockwave
 *    Special 2  "Rocket Upper"  (Crouch + Kick)   — jet-boosted rising uppercut
 */

// ═══════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════
const VW = 1280, VH = 720;
const FLOOR_Y = 540;
const STAGE_L = 60, STAGE_R = 1220;
const GRAVITY = 0.65;
const ROUND_TIME = 99;
const WINS_NEEDED = 2;
const HIT_STOP_FRAMES = 6;
const BLOCK_DAMAGE_MULT = 0.12;
const BLOCK_PUSH = 8;
const KNOCKBACK_BASE = 7;

// ═══════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let CW, CH, scale, offX, offY, dpr;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  CW = window.innerWidth * dpr;
  CH = window.innerHeight * dpr;
  canvas.width = CW;
  canvas.height = CH;
  scale = Math.min(CW / VW, CH / VH);
  offX = (CW - VW * scale) / 2;
  offY = (CH - VH * scale) / 2;
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const ease = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
const rand = (a, b) => Math.random() * (b - a) + a;
const randInt = (a, b) => Math.floor(rand(a, b + 1));

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ═══════════════════════════════════════
//  INPUT SYSTEM
// ═══════════════════════════════════════
const input = { left:false, right:false, up:false, down:false,
  punch:false, kick:false, block:false,
  punchPressed:false, kickPressed:false,
  punchBuffer:0, kickBuffer:0 };
let prevPunch = false, prevKick = false;

// Touch button definitions — positions are fractions of screen size
const TOUCH_BUTTONS = {
  // Left d-pad
  left:  { cx: 0.09, cy: 0.73, r: 0.045, label: '◀' },
  right: { cx: 0.19, cy: 0.73, r: 0.045, label: '▶' },
  up:    { cx: 0.14, cy: 0.60, r: 0.045, label: '▲' },
  down:  { cx: 0.14, cy: 0.86, r: 0.045, label: '▼' },
  // Right action buttons
  punch: { cx: 0.81, cy: 0.65, r: 0.050, label: 'P', color: '#00f0ff' },
  kick:  { cx: 0.92, cy: 0.75, r: 0.050, label: 'K', color: '#ff6600' },
  block: { cx: 0.81, cy: 0.85, r: 0.050, label: 'B', color: '#aaaaaa' },
};

const activeTouches = new Map(); // touchId -> buttonName

function getTouchButton(sx, sy) {
  const nx = sx / window.innerWidth;
  const ny = sy / window.innerHeight;
  let best = null, bestDist = Infinity;
  for (const [name, btn] of Object.entries(TOUCH_BUTTONS)) {
    const dx = nx - btn.cx, dy = ny - btn.cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < btn.r * 1.6 && dist < bestDist) {
      best = name; bestDist = dist;
    }
  }
  return best;
}

function updateInputFromTouches() {
  const pressed = new Set();
  for (const btn of activeTouches.values()) if (btn) pressed.add(btn);
  input.left  = pressed.has('left');
  input.right = pressed.has('right');
  input.up    = pressed.has('up');
  input.down  = pressed.has('down');
  input.punch = pressed.has('punch');
  input.kick  = pressed.has('kick');
  input.block = pressed.has('block');
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const btn = getTouchButton(t.clientX, t.clientY);
    activeTouches.set(t.identifier, btn);
    // Queue tap directly — this catches rapid taps that the game loop
    // would otherwise miss (touchend+touchstart between frames)
    if (btn === 'punch') input.punchBuffer = 8;
    if (btn === 'kick') input.kickBuffer = 8;
  }
  updateInputFromTouches();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const btn = getTouchButton(t.clientX, t.clientY);
    activeTouches.set(t.identifier, btn);
  }
  updateInputFromTouches();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) activeTouches.delete(t.identifier);
  updateInputFromTouches();
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) activeTouches.delete(t.identifier);
  updateInputFromTouches();
}, { passive: false });

// Keyboard fallback for desktop testing
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

function pollKeyboard() {
  input.left  = input.left  || !!keys['ArrowLeft']  || !!keys['KeyA'];
  input.right = input.right || !!keys['ArrowRight'] || !!keys['KeyD'];
  input.up    = input.up    || !!keys['ArrowUp']    || !!keys['KeyW'];
  input.down  = input.down  || !!keys['ArrowDown']  || !!keys['KeyS'];
  input.punch = input.punch || !!keys['KeyJ'] || !!keys['KeyZ'];
  input.kick  = input.kick  || !!keys['KeyK'] || !!keys['KeyX'];
  input.block = input.block || !!keys['KeyL'] || !!keys['KeyC'];
}

// ═══════════════════════════════════════
//  PARTICLE SYSTEM
// ═══════════════════════════════════════
const particles = [];
const MAX_PARTICLES = 200;

function spawnParticle(x, y, vx, vy, color, life, size, glow) {
  if (particles.length >= MAX_PARTICLES) particles.shift();
  particles.push({ x, y, vx, vy, color, life, maxLife: life, size, glow: glow || 8 });
}

function spawnHitSparks(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = rand(-Math.PI, Math.PI);
    const speed = rand(3, 10);
    spawnParticle(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed - 2,
      color, randInt(12, 25), rand(2, 5), 12);
  }
}

function spawnBlockSparks(x, y) {
  for (let i = 0; i < 8; i++) {
    const angle = rand(-0.8, 0.8) - Math.PI/2;
    spawnParticle(x, y, Math.cos(angle)*rand(2,6), Math.sin(angle)*rand(2,6),
      '#ffffff', randInt(8, 15), rand(1, 3), 6);
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.vx *= 0.97;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ═══════════════════════════════════════
//  PROJECTILE SYSTEM
// ═══════════════════════════════════════
const projectiles = [];

function spawnProjectile(owner, x, y, vx, damage, color) {
  projectiles.push({ owner, x, y, vx, damage, color, life: 120, w: 40, h: 16, hit: false });
}

function updateProjectiles(p1, p2) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const proj = projectiles[i];
    proj.x += proj.vx;
    proj.life--;
    if (proj.life <= 0 || proj.x < STAGE_L - 100 || proj.x > STAGE_R + 100) {
      projectiles.splice(i, 1); continue;
    }
    // Check hit
    const target = proj.owner === p1 ? p2 : p1;
    if (!proj.hit && target.state !== 'ko') {
      const projRect = { x: proj.x - proj.w/2, y: proj.y - proj.h/2, w: proj.w, h: proj.h };
      const targetRect = getHurtbox(target);
      if (rectsOverlap(projRect, targetRect)) {
        proj.hit = true;
        projectiles.splice(i, 1);
        applyHit(target, proj.damage, proj.vx > 0 ? 1 : -1, proj.owner);
      }
    }
  }
}

// ═══════════════════════════════════════
//  CHARACTER DEFINITION
// ═══════════════════════════════════════
function createCharacter(isNova, startX, facing) {
  return {
    name: isNova ? 'NOVA' : 'TITAN',
    isNova,
    // Colors
    primary:   isNova ? '#00f0ff' : '#ff4400',
    secondary: isNova ? '#0088cc' : '#ff8800',
    accent:    isNova ? '#ffffff' : '#ffcc00',
    dark:      isNova ? '#003344' : '#441100',
    // Physics
    x: startX, y: FLOOR_Y,
    vx: 0, vy: 0,
    facing,
    grounded: true,
    // Dimensions
    bodyW: isNova ? 36 : 52,
    bodyH: isNova ? 110 : 105,
    headR: isNova ? 17 : 21,
    // State
    state: 'idle',
    animTimer: 0,
    animDuration: 1,
    canAct: true,
    hitstun: 0,
    blockstun: 0,
    hasHit: false, // per-attack flag
    // Combat stats
    maxHP: isNova ? 1000 : 1100,
    hp: isNova ? 1000 : 1100,
    displayHP: isNova ? 1000 : 1100,
    walkSpeed: isNova ? 4.5 : 3.2,
    jumpForce: isNova ? -14 : -12.5,
    // Attack data
    attacks: {
      punch: {
        damage: isNova ? 55 : 75,
        range: isNova ? 80 : 70,
        duration: isNova ? 16 : 20,
        activeStart: isNova ? 3 : 5,
        activeEnd: isNova ? 10 : 13,
        knockback: isNova ? 5 : 8,
        hitboxW: isNova ? 75 : 70,
        hitboxH: 55,
        hitboxOY: -70,
      },
      kick: {
        damage: isNova ? 75 : 95,
        range: isNova ? 100 : 90,
        duration: isNova ? 22 : 26,
        activeStart: isNova ? 5 : 7,
        activeEnd: isNova ? 15 : 18,
        knockback: isNova ? 7 : 10,
        hitboxW: isNova ? 95 : 85,
        hitboxH: 50,
        hitboxOY: -40,
      },
      air_punch: {
        damage: isNova ? 50 : 70,
        range: isNova ? 70 : 60,
        duration: 14,
        activeStart: 2,
        activeEnd: 10,
        knockback: 4,
        hitboxW: 70,
        hitboxH: 60,
        hitboxOY: -55,
      },
      air_kick: {
        damage: isNova ? 70 : 85,
        range: isNova ? 90 : 80,
        duration: 18,
        activeStart: 4,
        activeEnd: 13,
        knockback: 6,
        hitboxW: 85,
        hitboxH: 55,
        hitboxOY: -45,
      },
      special1: {
        damage: isNova ? 100 : 120,
        range: isNova ? 900 : 180,
        duration: isNova ? 28 : 32,
        activeStart: isNova ? 10 : 12,
        activeEnd: isNova ? 16 : 22,
        knockback: isNova ? 3 : 12,
        hitboxW: isNova ? 40 : 180,
        hitboxH: isNova ? 30 : 60,
        hitboxOY: isNova ? -60 : -30,
        isProjectile: isNova,
      },
      special2: {
        damage: isNova ? 110 : 140,
        range: isNova ? 140 : 75,
        duration: isNova ? 24 : 30,
        activeStart: isNova ? 6 : 8,
        activeEnd: isNova ? 17 : 20,
        knockback: isNova ? 10 : 14,
        hitboxW: isNova ? 135 : 75,
        hitboxH: isNova ? 55 : 100,
        hitboxOY: isNova ? -40 : -90,
      },
    },
    // Round record
    wins: 0,
  };
}

// ═══════════════════════════════════════
//  CHARACTER HELPERS
// ═══════════════════════════════════════
function getHurtbox(c) {
  const crouch = (c.state === 'crouch' || c.state === 'special1' || c.state === 'special2') ? 0.65 : 1;
  const h = c.bodyH * crouch;
  // Hurtbox is wider than visual body for more reliable hit registration
  const w = c.bodyW + 20;
  return { x: c.x - w/2, y: c.y - h - 5, w, h: h + 5 };
}

function getHitbox(c) {
  const atk = c.attacks[c.state];
  if (!atk) return null;
  if (c.animTimer < atk.activeStart || c.animTimer > atk.activeEnd) return null;
  if (c.hasHit) return null;
  const fx = c.facing;
  // Start hitbox slightly behind character center for close-range reliability
  return {
    x: c.x + (fx > 0 ? -5 : 5 - atk.hitboxW),
    y: c.y + atk.hitboxOY,
    w: atk.hitboxW,
    h: atk.hitboxH,
  };
}

function startAttack(c, attackName) {
  const atk = c.attacks[attackName];
  if (!atk) return;
  c.state = attackName;
  c.animTimer = 0;
  c.animDuration = atk.duration;
  c.canAct = false;
  c.hasHit = false;
  // Consume input buffer so the attack doesn't double-fire
  input.punchBuffer = 0;
  input.kickBuffer = 0;
  input.punchPressed = false;
  input.kickPressed = false;
}

function resetCharacter(c, startX, facing) {
  c.x = startX; c.y = FLOOR_Y;
  c.vx = 0; c.vy = 0;
  c.facing = facing;
  c.grounded = true;
  c.state = 'idle';
  c.animTimer = 0; c.animDuration = 1;
  c.canAct = true;
  c.hitstun = 0; c.blockstun = 0;
  c.hasHit = false;
  c.hp = c.maxHP;
  c.displayHP = c.maxHP;
}

// ═══════════════════════════════════════
//  HIT RESOLUTION
// ═══════════════════════════════════════
let hitstopTimer = 0;
let screenShake = { x: 0, y: 0, intensity: 0 };

function applyHit(target, damage, direction, attacker) {
  const isBlocking = target.state === 'block';

  if (isBlocking) {
    // Blocked
    target.hp -= Math.floor(damage * BLOCK_DAMAGE_MULT);
    target.blockstun = 12;
    target.state = 'blockstun';
    target.animTimer = 0;
    target.animDuration = 12;
    target.canAct = false;
    target.vx = direction * BLOCK_PUSH;
    spawnBlockSparks(target.x - direction * 20, target.y - target.bodyH * 0.5);
    hitstopTimer = 3;
  } else {
    // Clean hit
    target.hp -= damage;
    target.hitstun = 18;
    target.state = 'hit';
    target.animTimer = 0;
    target.animDuration = 18;
    target.canAct = false;
    target.vx = direction * KNOCKBACK_BASE + direction * (damage / 25);
    target.vy = -3;
    spawnHitSparks(target.x - direction * 15, target.y - target.bodyH * 0.5,
      attacker.primary, 15);
    hitstopTimer = HIT_STOP_FRAMES;
    screenShake.intensity = damage / 8;
  }

  if (target.hp <= 0) {
    target.hp = 0;
    target.state = 'ko';
    target.animTimer = 0;
    target.animDuration = 90;
    target.canAct = false;
    target.vx = direction * 10;
    target.vy = -8;
    spawnHitSparks(target.x, target.y - target.bodyH * 0.5, target.primary, 30);
    screenShake.intensity = 18;
    hitstopTimer = 14;
  }
}

// ═══════════════════════════════════════
//  CHARACTER UPDATE
// ═══════════════════════════════════════
function updateCharacter(c, inp, opponent) {
  // Animation timer
  c.animTimer++;

  // Smooth health bar
  c.displayHP = lerp(c.displayHP, c.hp, 0.1);

  // Auto-face opponent
  if (c.canAct && c.state !== 'ko') {
    c.facing = opponent.x > c.x ? 1 : -1;
  }

  // KO state
  if (c.state === 'ko') {
    c.vy += GRAVITY;
    c.x += c.vx;
    c.y += c.vy;
    c.vx *= 0.92;
    if (c.y >= FLOOR_Y) {
      c.y = FLOOR_Y;
      c.vy = 0;
      c.vx *= 0.8;
      c.grounded = true;
    }
    return;
  }

  // Hit/blockstun
  if (c.state === 'hit' || c.state === 'blockstun') {
    c.vx *= 0.88;
    c.vy += GRAVITY;
    c.x += c.vx;
    c.y += c.vy;
    if (c.y >= FLOOR_Y) { c.y = FLOOR_Y; c.vy = 0; c.grounded = true; }
    if (c.animTimer >= c.animDuration) {
      c.state = 'idle'; c.canAct = true;
    }
    c.x = clamp(c.x, STAGE_L + c.bodyW/2, STAGE_R - c.bodyW/2);
    return;
  }

  // Attack animation in progress
  if (!c.canAct && c.state !== 'idle') {
    // Special1 projectile spawn
    if (c.state === 'special1' && c.attacks.special1.isProjectile &&
        c.animTimer === c.attacks.special1.activeStart && !c.hasHit) {
      spawnProjectile(c, c.x + c.facing * 40, c.y - 55,
        c.facing * 10, c.attacks.special1.damage, c.primary);
      c.hasHit = true;
    }
    // Forward lunge for special2 (Nova dash, Titan uppercut)
    if (c.state === 'special2') {
      const atk = c.attacks.special2;
      if (c.animTimer >= atk.activeStart && c.animTimer <= atk.activeEnd) {
        if (c.isNova) {
          c.x += c.facing * 8; // Nova dashes forward
        } else if (c.animTimer <= atk.activeStart + 3) {
          c.vy = -10; // Titan rises
          c.grounded = false;
        }
      }
    }
    // Check animation end
    if (c.animTimer >= c.animDuration) {
      c.state = 'idle'; c.canAct = true;
    }
    // Apply gravity for airborne attacks
    if (!c.grounded) {
      c.vy += GRAVITY;
      c.y += c.vy;
      if (c.y >= FLOOR_Y) { c.y = FLOOR_Y; c.vy = 0; c.grounded = true; }
    }
    c.x += c.vx;
    c.vx *= 0.92;
    c.x = clamp(c.x, STAGE_L + c.bodyW/2, STAGE_R - c.bodyW/2);
    return;
  }

  // === Player can act ===

  // Gravity
  if (!c.grounded) {
    c.vy += GRAVITY;
    c.y += c.vy;
    if (c.y >= FLOOR_Y) {
      c.y = FLOOR_Y; c.vy = 0; c.grounded = true;
    }
  }

  // Airborne actions
  if (!c.grounded) {
    if (inp.punchPressed) { startAttack(c, 'air_punch'); return; }
    if (inp.kickPressed) { startAttack(c, 'air_kick'); return; }
    c.x += c.vx;
    c.x = clamp(c.x, STAGE_L + c.bodyW/2, STAGE_R - c.bodyW/2);
    return;
  }

  // Grounded actions
  c.vx = 0;

  // Block
  if (inp.block) {
    c.state = 'block';
    c.block = true;
    return;
  }
  c.block = false;

  // Crouch + attack = special
  if (inp.down) {
    if (inp.punchPressed) { startAttack(c, 'special1'); return; }
    if (inp.kickPressed)  { startAttack(c, 'special2'); return; }
    c.state = 'crouch';
    return;
  }

  // Standing attacks
  if (inp.punchPressed) { startAttack(c, 'punch'); return; }
  if (inp.kickPressed)  { startAttack(c, 'kick');  return; }

  // Jump
  if (inp.up && c.grounded) {
    c.vy = c.jumpForce;
    c.grounded = false;
    c.vx = inp.left ? -c.walkSpeed * 1.2 : inp.right ? c.walkSpeed * 1.2 : 0;
    c.state = 'jump';
    return;
  }

  // Walk
  if (inp.left) {
    c.vx = -c.walkSpeed;
    c.state = 'walk';
  } else if (inp.right) {
    c.vx = c.walkSpeed;
    c.state = 'walk';
  } else {
    c.state = 'idle';
  }

  c.x += c.vx;
  c.x = clamp(c.x, STAGE_L + c.bodyW/2, STAGE_R - c.bodyW/2);

  // Push apart if overlapping
  const dist = Math.abs(c.x - opponent.x);
  if (dist < c.bodyW * 0.8 && opponent.state !== 'ko') {
    const push = (c.bodyW * 0.8 - dist) / 2;
    if (c.x < opponent.x) { c.x -= push; } else { c.x += push; }
  }
}

// ═══════════════════════════════════════
//  AI SYSTEM
// ═══════════════════════════════════════
const AI = {
  decision: 'idle', timer: 0, aggression: 0.55, reactionDelay: 0,
  comboTimer: 0, lastPlayerState: 'idle',
};

function getAIInput(cpu, player) {
  const inp = { left:false, right:false, up:false, down:false,
    punch:false, kick:false, block:false, punchPressed:false, kickPressed:false };

  if (cpu.state === 'ko' || !cpu.canAct) return inp;

  const dist = Math.abs(cpu.x - player.x);
  const facingPlayer = (player.x > cpu.x) === (cpu.facing > 0);
  const playerAttacking = ['punch','kick','special1','special2','air_punch','air_kick']
    .includes(player.state);
  const hpRatio = cpu.hp / cpu.maxHP;
  const playerHpRatio = player.hp / player.maxHP;

  AI.timer--;
  if (AI.timer <= 0) {
    // Make a new decision
    AI.timer = randInt(8, 22);
    const r = Math.random();

    // Defensive reaction to player attacks
    if (playerAttacking && dist < 160 && Math.random() < 0.55) {
      AI.decision = 'block';
      AI.timer = randInt(10, 20);
    }
    // Close range
    else if (dist < 100) {
      if (r < AI.aggression * 0.7) {
        AI.decision = Math.random() < 0.5 ? 'punch' : 'kick';
      } else if (r < AI.aggression * 0.7 + 0.15) {
        AI.decision = Math.random() < 0.5 ? 'special1' : 'special2';
      } else if (r < 0.85) {
        AI.decision = 'block';
      } else {
        AI.decision = 'retreat';
      }
    }
    // Mid range
    else if (dist < 250) {
      if (r < AI.aggression * 0.5) {
        AI.decision = 'advance';
      } else if (r < AI.aggression * 0.5 + 0.2) {
        AI.decision = 'special1'; // Seismic slam range
      } else if (r < 0.7) {
        AI.decision = 'advance';
      } else if (r < 0.85) {
        AI.decision = 'block';
      } else {
        AI.decision = 'retreat';
      }
    }
    // Far range
    else {
      if (r < 0.65) {
        AI.decision = 'advance';
      } else if (r < 0.8) {
        AI.decision = 'jump_in';
      } else {
        AI.decision = 'idle';
      }
    }

    // Increase aggression when losing
    AI.aggression = clamp(0.55 + (playerHpRatio - hpRatio) * 0.3, 0.3, 0.85);
  }

  // Counter-attack after blocking
  if (AI.decision === 'block' && player.state === 'idle' && AI.lastPlayerState !== 'idle' && dist < 140) {
    AI.decision = Math.random() < 0.5 ? 'punch' : 'special2';
    AI.timer = 5;
  }
  AI.lastPlayerState = player.state;

  // Execute decision
  switch (AI.decision) {
    case 'advance':
      if (cpu.x < player.x) inp.right = true; else inp.left = true;
      break;
    case 'retreat':
      if (cpu.x < player.x) inp.left = true; else inp.right = true;
      break;
    case 'jump_in':
      inp.up = true;
      if (cpu.x < player.x) inp.right = true; else inp.left = true;
      AI.decision = 'air_attack';
      AI.timer = 20;
      break;
    case 'air_attack':
      if (!cpu.grounded) {
        inp.kickPressed = true; inp.kick = true;
      } else {
        AI.decision = 'advance'; AI.timer = 5;
      }
      break;
    case 'punch':
      inp.punchPressed = true; inp.punch = true;
      AI.decision = 'idle'; AI.timer = 8;
      break;
    case 'kick':
      inp.kickPressed = true; inp.kick = true;
      AI.decision = 'idle'; AI.timer = 10;
      break;
    case 'special1':
      inp.down = true; inp.punchPressed = true; inp.punch = true;
      AI.decision = 'idle'; AI.timer = 15;
      break;
    case 'special2':
      inp.down = true; inp.kickPressed = true; inp.kick = true;
      AI.decision = 'idle'; AI.timer = 15;
      break;
    case 'block':
      inp.block = true;
      break;
  }

  return inp;
}

const camera = { x: VW/2, y: VH/2, zoom: 1, targetZoom: 1 };

function updateCamera(p1, p2) {
  const midX = (p1.x + p2.x) / 2;
  const midY = Math.min(p1.y, p2.y) - 50;
  const dist = Math.abs(p1.x - p2.x);

  camera.x = lerp(camera.x, midX, 0.08);
  camera.y = lerp(camera.y, clamp(midY, VH/2 - 80, VH/2), 0.06);

  // Zoom out when far apart
  const idealZoom = clamp(700 / Math.max(dist + 200, 400), 0.75, 1.15);
  camera.targetZoom = idealZoom;
  camera.zoom = lerp(camera.zoom, camera.targetZoom, 0.05);

  // Screen shake decay
  if (screenShake.intensity > 0.5) {
    screenShake.x = rand(-1, 1) * screenShake.intensity;
    screenShake.y = rand(-1, 1) * screenShake.intensity;
    screenShake.intensity *= 0.85;
  } else {
    screenShake.x = 0; screenShake.y = 0; screenShake.intensity = 0;
  }
}

// Far layer (smaller, dimmer)

  { x: 940, w: 40, h: 300 }, { x: 1010, w: 55, h: 170 }, { x: 1100, w: 35, h: 240 },
  { x: 1160, w: 50, h: 190 }, { x: 1240, w: 40, h: 210 },
];
(function(){
  // Generate stable window patterns
  let s = 42;
  const prand = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return (s % 1000) / 1000; };
  for (const b of _buildingsData) {
    const wins = [];
    const baseY = FLOOR_Y - 30;
    for (let wy = baseY - b.h + 12; wy < baseY - 8; wy += 14) {
      for (let wx = b.x + 5; wx < b.x + b.w - 5; wx += 10) {
        const r = prand();
        if (r > 0.35) wins.push({ x: wx, y: wy, c: prand() > 0.6 ? 0 : prand() > 0.5 ? 1 : 2 });
      }
    }
    _buildingsSeed.push(wins);
  }
})();

function drawBackground(camX, camY, zoom) {
  const t = Date.now() * 0.001;

  // Sky gradient — deeper, more atmospheric
  const skyGrad = ctx.createLinearGradient(0, -100, 0, VH + 100);
  skyGrad.addColorStop(0, '#020208');
  skyGrad.addColorStop(0.25, '#050518');
  skyGrad.addColorStop(0.55, '#0a0830');
  skyGrad.addColorStop(0.8, '#0e0a38');
  skyGrad.addColorStop(1, '#100c40');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(-400, -200, VW + 800, VH + 400);

  // Nebula / atmospheric haze
  drawNebula(t);

  // Far city layer (more parallax, dimmer)
  ctx.save();
  ctx.translate(-camX * 0.04, 0);
  ctx.globalAlpha = 0.2;
  drawCityLayer(_farBuildingsData, FLOOR_Y - 10, '#0c0620', '#060310', null, 0.15);
  ctx.restore();

  // Main city skyline
  ctx.save();
  ctx.translate(-camX * 0.1, 0);
  ctx.globalAlpha = 0.55;
  drawCityLayer(_buildingsData, FLOOR_Y - 30, '#140a3a', '#0a0520', _buildingsSeed, 0.4);
  ctx.restore();

  // Atmospheric fog at horizon
  const fogGrad = ctx.createLinearGradient(0, FLOOR_Y - 80, 0, FLOOR_Y + 10);
  fogGrad.addColorStop(0, 'rgba(10,8,50,0)');
  fogGrad.addColorStop(0.6, 'rgba(15,12,60,0.3)');
  fogGrad.addColorStop(1, 'rgba(10,8,50,0.5)');
  ctx.fillStyle = fogGrad;
  ctx.fillRect(-400, FLOOR_Y - 80, VW + 800, 100);

  // Grid floor (Tron-style, enhanced)
  drawGridFloor(camX, zoom, t);

  // Stage edge pillars
  drawStagePillars(t);

  // Foreground haze (subtle)
  const fgFog = ctx.createLinearGradient(0, FLOOR_Y + 20, 0, VH + 50);
  fgFog.addColorStop(0, 'rgba(5,5,30,0)');
  fgFog.addColorStop(1, 'rgba(5,5,30,0.6)');
  ctx.fillStyle = fgFog;
  ctx.fillRect(-400, FLOOR_Y + 20, VW + 800, VH);
}

function drawNebula(t) {
  // Soft colored light patches in the sky
  const patches = [
    { x: 200, y: 120, r: 220, color: '20,0,80' },
    { x: 700, y: 80, r: 280, color: '0,20,60' },
    { x: 1100, y: 150, r: 200, color: '40,0,50' },
    { x: 450, y: 200, r: 160, color: '0,30,50' },
  ];
  for (const p of patches) {
    const drift = Math.sin(t * 0.15 + p.x * 0.01) * 15;
    const grad = ctx.createRadialGradient(p.x + drift, p.y, 0, p.x + drift, p.y, p.r);
    grad.addColorStop(0, `rgba(${p.color},0.08)`);
    grad.addColorStop(0.5, `rgba(${p.color},0.03)`);
    grad.addColorStop(1, `rgba(${p.color},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);
  }
}

function drawCityLayer(buildings, baseY, colorTop, colorBot, windowData, windowAlpha) {
  for (let i = 0; i < buildings.length; i++) {
    const b = buildings[i];
    // Building body
    const grad = ctx.createLinearGradient(0, baseY - b.h, 0, baseY);
    grad.addColorStop(0, colorTop);
    grad.addColorStop(1, colorBot);
    ctx.fillStyle = grad;
    ctx.fillRect(b.x, baseY - b.h, b.w, b.h);

    // Subtle edge highlight
    ctx.strokeStyle = 'rgba(100,80,180,0.12)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(b.x, baseY - b.h, b.w, b.h);

    // Roof antenna / spire (every other building)
    if (i % 3 === 0) {
      ctx.strokeStyle = 'rgba(100,80,200,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(b.x + b.w / 2, baseY - b.h);
      ctx.lineTo(b.x + b.w / 2, baseY - b.h - 25);
      ctx.stroke();
      // Blink light
      if (Math.sin(Date.now() * 0.003 + i) > 0.3) {
        ctx.beginPath();
        ctx.arc(b.x + b.w / 2, baseY - b.h - 25, 2, 0, Math.PI * 2);
        ctx.fillStyle = i % 2 === 0 ? '#ff2200' : '#00ff88';
        ctx.fill();
      }
    }

    // Neon sign on some buildings
    if (i % 4 === 1 && b.h > 200) {
      const signY = baseY - b.h * 0.6;
      ctx.fillStyle = i % 2 === 0 ? 'rgba(0,200,255,0.15)' : 'rgba(255,50,100,0.12)';
      ctx.fillRect(b.x + 4, signY, b.w - 8, 8);
    }

    // Windows
    if (windowData && windowData[i]) {
      for (const w of windowData[i]) {
        const colors = ['rgba(40,60,180,A)', 'rgba(60,30,120,A)', 'rgba(0,180,200,A)'];
        ctx.fillStyle = colors[w.c].replace('A', String(windowAlpha));
        ctx.fillRect(w.x, w.y, 4, 5);
      }
    }
  }
}

function drawGridFloor(camX, zoom, t) {
  ctx.save();
  const floorTop = FLOOR_Y;
  const floorBot = VH + 80;
  const gridSpacing = 60;

  // Floor base color
  const floorGrad = ctx.createLinearGradient(0, floorTop, 0, floorBot);
  floorGrad.addColorStop(0, 'rgba(8,6,35,0.9)');
  floorGrad.addColorStop(1, 'rgba(4,3,18,1)');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(-400, floorTop, VW + 800, floorBot - floorTop);

  // Horizontal lines with perspective fade
  for (let y = floorTop; y < floorBot; y += 10) {
    const yt = (y - floorTop) / (floorBot - floorTop);
    const pulse = Math.sin(t * 2 - yt * 8) * 0.02;
    ctx.strokeStyle = `rgba(0,160,255,${0.04 + yt * 0.1 + pulse})`;
    ctx.lineWidth = 0.4 + yt * 1.2;
    ctx.beginPath();
    ctx.moveTo(-400, y);
    ctx.lineTo(VW + 400, y);
    ctx.stroke();
  }

  // Vertical lines with perspective convergence
  const offset = (camX * 0.5) % gridSpacing;
  for (let x = -gridSpacing * 2; x < VW + gridSpacing * 3; x += gridSpacing) {
    const sx = x - offset;
    const centerDist = Math.abs(sx - VW / 2) / (VW / 2);
    ctx.strokeStyle = `rgba(0,160,255,${0.06 + centerDist * 0.04})`;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(sx, floorTop);
    ctx.lineTo(sx + (sx - VW / 2) * 0.6, floorBot);
    ctx.stroke();
  }

  // Animated scan line sweeping across the floor
  const scanX = ((t * 120) % (VW + 400)) - 200;
  const scanGrad = ctx.createLinearGradient(scanX - 60, 0, scanX + 60, 0);
  scanGrad.addColorStop(0, 'rgba(0,200,255,0)');
  scanGrad.addColorStop(0.5, 'rgba(0,200,255,0.08)');
  scanGrad.addColorStop(1, 'rgba(0,200,255,0)');
  ctx.fillStyle = scanGrad;
  ctx.fillRect(scanX - 60, floorTop, 120, floorBot - floorTop);

  // Glowing floor line
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#0088ff';
  ctx.strokeStyle = '#00aaff55';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-400, floorTop);
  ctx.lineTo(VW + 400, floorTop);
  ctx.stroke();
  // Second brighter thin line
  ctx.strokeStyle = '#44ddff22';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-400, floorTop + 1);
  ctx.lineTo(VW + 400, floorTop + 1);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Hex grid accent patches near the fighters (subtle detail)
  drawHexAccent(400, floorTop + 40, t, 0.04);
  drawHexAccent(880, floorTop + 35, t + 2, 0.03);

  ctx.restore();
}

function drawHexAccent(cx, cy, t, alpha) {
  const s = 18;
  ctx.save();
  ctx.globalAlpha = alpha + Math.sin(t * 1.5) * 0.01;
  ctx.strokeStyle = '#00ccff';
  ctx.lineWidth = 0.6;
  for (let r = 0; r < 3; r++) {
    for (let q = -2; q <= 2; q++) {
      const hx = cx + q * s * 1.7 + (r % 2) * s * 0.85;
      const hy = cy + r * s * 1.5;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i - Math.PI / 6;
        const px = hx + Math.cos(a) * s * 0.5;
        const py = hy + Math.sin(a) * s * 0.5;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawStagePillars(t) {
  for (let pi = 0; pi < 2; pi++) {
    const px = pi === 0 ? STAGE_L - 15 : STAGE_R + 15;
    const pillarH = 350;

    // Main beam
    const grad = ctx.createLinearGradient(0, FLOOR_Y - pillarH, 0, FLOOR_Y);
    grad.addColorStop(0, 'rgba(0,200,255,0)');
    grad.addColorStop(0.3, 'rgba(0,200,255,0.04)');
    grad.addColorStop(0.7, 'rgba(0,200,255,0.1)');
    grad.addColorStop(1, 'rgba(0,200,255,0.2)');
    ctx.fillStyle = grad;
    ctx.fillRect(px - 4, FLOOR_Y - pillarH, 8, pillarH);

    // Inner bright core
    const coreGrad = ctx.createLinearGradient(0, FLOOR_Y - pillarH, 0, FLOOR_Y);
    coreGrad.addColorStop(0, 'rgba(100,220,255,0)');
    coreGrad.addColorStop(0.5, 'rgba(100,220,255,0.05)');
    coreGrad.addColorStop(1, 'rgba(100,220,255,0.15)');
    ctx.fillStyle = coreGrad;
    ctx.fillRect(px - 1.5, FLOOR_Y - pillarH, 3, pillarH);

    // Ring markers along pillar
    for (let ry = FLOOR_Y - 60; ry > FLOOR_Y - pillarH + 30; ry -= 70) {
      const ringAlpha = 0.08 + Math.sin(t * 2 + ry * 0.05) * 0.04;
      ctx.strokeStyle = `rgba(0,200,255,${ringAlpha})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px - 12, ry);
      ctx.lineTo(px + 12, ry);
      ctx.stroke();
    }

    // Base glow pool
    ctx.save();
    ctx.shadowBlur = 30;
    ctx.shadowColor = '#0088ff';
    ctx.beginPath();
    ctx.ellipse(px, FLOOR_Y + 2, 20, 5, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,150,255,0.15)';
    ctx.fill();
    ctx.restore();

    // Top cap light
    ctx.beginPath();
    ctx.arc(px, FLOOR_Y - pillarH, 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,220,255,${0.3 + Math.sin(t * 3 + pi) * 0.15})`;
    ctx.fill();
  }
}

// Helper: draw a limb segment with joint and neon trim
function drawLimb(x1, y1, x2, y2, w, fillColor, trimColor, jointR) {
  // Outline
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = w + 3;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  // Fill
  ctx.strokeStyle = fillColor;
  ctx.lineWidth = w;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  // Neon trim (thin bright line along center)
  ctx.strokeStyle = trimColor;
  ctx.lineWidth = 1.2;
  ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.globalAlpha = 1;
  // Joint circle
  if (jointR > 0) {
    ctx.beginPath();
    ctx.arc(x2, y2, jointR, 0, Math.PI * 2);
    ctx.fillStyle = fillColor;
    ctx.fill();
    ctx.strokeStyle = trimColor;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function drawCharacter(c) {
  const { x, y, facing: f, state, animTimer, animDuration, isNova,
          primary, secondary, accent, dark, bodyW, bodyH, headR } = c;
  const progress = clamp(animTimer / Math.max(animDuration, 1), 0, 1);
  const time = Date.now() * 0.001;

  ctx.save();
  ctx.translate(x, y);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Crouch offset
  let crouchOff = 0;
  if (state === 'crouch' || state === 'special1' || state === 'special2') crouchOff = bodyH * 0.3;
  if (state === 'hit') crouchOff = 5;

  // Torso lean
  let lean = 0;
  if (state === 'punch' && progress < 0.5) lean = f * 5;
  if (state === 'punch' && progress >= 0.5) lean = f * -2;
  if (state === 'kick') lean = f * -4;
  if (state === 'hit') lean = -f * 7;
  if (state === 'block') lean = -f * 2;

  // Breathing animation
  const breathe = Math.sin(time * 3) * 2;
  if (state === 'idle') crouchOff -= breathe;

  // === DIMENSIONS ===
  const legLen = isNova ? 50 : 44;
  const torsoH = bodyH - legLen - headR * 2;
  const torsoTop = -(torsoH + legLen - crouchOff) + lean;
  const torsoBot = -legLen + crouchOff * 0.3;
  const shoulderY = torsoTop + 8;
  const hipY = torsoBot;
  const armLen = isNova ? 48 : 40;

  // === CHARACTER SHADOW ON FLOOR ===
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.beginPath();
  ctx.ellipse(0, 2, bodyW * 0.7, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#000011';
  ctx.fill();
  ctx.restore();

  // ════════════════════════════════════
  //  LEGS
  // ════════════════════════════════════
  const legW = isNova ? 8 : 13;
  const bootH = isNova ? 10 : 14;

  // Calculate leg positions
  let blegX = f * -14, blegY = 0, flegX = f * 14, flegY = 0;
  let bkneeX = f * -8, bkneeY = hipY + legLen * 0.45;
  let fkneeX = f * 8, fkneeY = hipY + legLen * 0.45;

  if (state === 'walk') {
    const ws = Math.sin(animTimer * 0.3);
    blegX = f * -14 + ws * 14; bkneeX = f * -8 + ws * 7;
    flegX = f * 14 - ws * 14; fkneeX = f * 8 - ws * 7;
  }
  if (state === 'crouch') {
    blegX = f * -22; blegY = crouchOff; bkneeX = f * -16; bkneeY = hipY + legLen * 0.3;
    flegX = f * 22; flegY = crouchOff; fkneeX = f * 16; fkneeY = hipY + legLen * 0.3;
  }
  if (state === 'kick' && progress > 0.25 && progress < 0.65) {
    const kp = (progress - 0.25) / 0.4;
    const ext = Math.sin(kp * Math.PI);
    flegX = f * (20 + 70 * ext);
    flegY = -18 - 18 * ext;
    fkneeX = f * (16 + 30 * ext);
    fkneeY = hipY + legLen * 0.3 - 10 * ext;
  }
  if (state === 'special2' && isNova && progress > 0.3 && progress < 0.65) {
    const kp = (progress - 0.3) / 0.35;
    const ext = Math.sin(kp * Math.PI);
    flegX = f * (25 + 85 * ext);
    flegY = -22 * ext;
    fkneeX = f * (18 + 40 * ext);
    fkneeY = hipY + legLen * 0.25 - 12 * ext;
  }

  // Back leg: thigh + shin + boot
  const bLegFill = isNova ? '#004455' : '#3a1500';
  drawLimb(f * -5, hipY, bkneeX, bkneeY, legW, bLegFill, secondary, isNova ? 3 : 4);
  drawLimb(bkneeX, bkneeY, blegX, blegY, legW - 1, bLegFill, secondary, 0);
  // Boot
  ctx.fillStyle = isNova ? '#006677' : '#552200';
  ctx.fillRect(blegX - legW * 0.6, blegY - 2, legW * 1.5, bootH);
  ctx.strokeStyle = primary;
  ctx.lineWidth = 1;
  ctx.strokeRect(blegX - legW * 0.6, blegY - 2, legW * 1.5, bootH);

  // Front leg: thigh + shin + boot
  const fLegFill = isNova ? '#005566' : '#4a1a00';
  drawLimb(f * 5, hipY, fkneeX, fkneeY, legW + 1, fLegFill, primary, isNova ? 3.5 : 5);
  drawLimb(fkneeX, fkneeY, flegX, flegY, legW, fLegFill, primary, 0);
  // Boot
  ctx.fillStyle = isNova ? '#007788' : '#662800';
  ctx.fillRect(flegX - legW * 0.6, flegY - 2, legW * 1.5, bootH);
  ctx.strokeStyle = primary;
  ctx.lineWidth = 1.2;
  ctx.strokeRect(flegX - legW * 0.6, flegY - 2, legW * 1.5, bootH);

  // ════════════════════════════════════
  //  TORSO
  // ════════════════════════════════════
  ctx.save();

  if (isNova) {
    // ── NOVA TORSO: sleek, fitted, energy lines ──
    // Main body
    ctx.beginPath();
    ctx.moveTo(-bodyW/2 + 6, torsoBot + 2);
    ctx.lineTo(-bodyW/2 + 2, torsoTop + 10);
    ctx.quadraticCurveTo(-bodyW/4, torsoTop - 2, 0, torsoTop);
    ctx.quadraticCurveTo(bodyW/4, torsoTop - 2, bodyW/2 - 2, torsoTop + 10);
    ctx.lineTo(bodyW/2 - 6, torsoBot + 2);
    ctx.closePath();

    // Dark fill with gradient
    const tGrad = ctx.createLinearGradient(0, torsoTop, 0, torsoBot);
    tGrad.addColorStop(0, '#002833');
    tGrad.addColorStop(0.5, '#003d4d');
    tGrad.addColorStop(1, '#002028');
    ctx.fillStyle = tGrad;
    ctx.fill();

    // Edge glow
    ctx.shadowBlur = 10;
    ctx.shadowColor = primary;
    ctx.strokeStyle = primary;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Circuit-line accents
    ctx.strokeStyle = '#00f0ff55';
    ctx.lineWidth = 0.8;
    // V-pattern from shoulders to center
    ctx.beginPath();
    ctx.moveTo(-bodyW/2 + 6, torsoTop + 12);
    ctx.lineTo(0, (torsoTop + torsoBot) / 2 + 5);
    ctx.lineTo(bodyW/2 - 6, torsoTop + 12);
    ctx.stroke();
    // Side accent lines
    ctx.beginPath();
    ctx.moveTo(-bodyW/2 + 4, torsoTop + 20);
    ctx.lineTo(-bodyW/2 + 4, torsoBot - 5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(bodyW/2 - 4, torsoTop + 20);
    ctx.lineTo(bodyW/2 - 4, torsoBot - 5);
    ctx.stroke();

    // Central reactor core (diamond shape)
    const coreY = (torsoTop + torsoBot) / 2;
    ctx.save();
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#00f0ff';
    ctx.fillStyle = '#00ddff';
    ctx.beginPath();
    ctx.moveTo(0, coreY - 6);
    ctx.lineTo(5, coreY);
    ctx.lineTo(0, coreY + 6);
    ctx.lineTo(-5, coreY);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(0, coreY, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Shoulder pads (small, sleek)
    for (const side of [-1, 1]) {
      ctx.fillStyle = '#004455';
      ctx.strokeStyle = primary;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(side * bodyW/2 * 0.7, shoulderY + 2, 8, 5, side * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }

  } else {
    // ── TITAN TORSO: broad, armored, heavy plates ──
    // Main body — wider, angular
    ctx.beginPath();
    ctx.moveTo(-bodyW/2 - 2, torsoBot + 4);
    ctx.lineTo(-bodyW/2 - 5, torsoTop + 15);
    ctx.lineTo(-bodyW/2 + 3, torsoTop + 4);
    ctx.lineTo(-bodyW/4, torsoTop);
    ctx.lineTo(bodyW/4, torsoTop);
    ctx.lineTo(bodyW/2 - 3, torsoTop + 4);
    ctx.lineTo(bodyW/2 + 5, torsoTop + 15);
    ctx.lineTo(bodyW/2 + 2, torsoBot + 4);
    ctx.closePath();

    // Armored gradient
    const tGrad = ctx.createLinearGradient(0, torsoTop, 0, torsoBot);
    tGrad.addColorStop(0, '#2a1200');
    tGrad.addColorStop(0.4, '#3a1800');
    tGrad.addColorStop(1, '#1a0a00');
    ctx.fillStyle = tGrad;
    ctx.fill();

    // Edge glow
    ctx.shadowBlur = 10;
    ctx.shadowColor = primary;
    ctx.strokeStyle = primary;
    ctx.lineWidth = 1.8;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Chest plate (layered armor)
    ctx.beginPath();
    const cpTop = torsoTop + 8;
    const cpBot = (torsoTop + torsoBot) / 2 + 5;
    ctx.moveTo(-bodyW/3, cpTop);
    ctx.lineTo(bodyW/3, cpTop);
    ctx.lineTo(bodyW/3 - 4, cpBot);
    ctx.lineTo(0, cpBot + 6);
    ctx.lineTo(-bodyW/3 + 4, cpBot);
    ctx.closePath();
    ctx.fillStyle = '#4a2000';
    ctx.fill();
    ctx.strokeStyle = '#ff660044';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Belt / waist armor
    ctx.fillStyle = '#331500';
    ctx.fillRect(-bodyW/2, torsoBot - 6, bodyW, 10);
    ctx.strokeStyle = '#ff880044';
    ctx.lineWidth = 0.8;
    ctx.strokeRect(-bodyW/2, torsoBot - 6, bodyW, 10);

    // Central reactor (hexagonal, orange glow)
    const coreY = (cpTop + cpBot) / 2;
    ctx.save();
    ctx.shadowBlur = 22;
    ctx.shadowColor = '#ff6600';
    ctx.fillStyle = '#ff5500';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i - Math.PI / 6;
      const px = Math.cos(a) * 7;
      const py = coreY + Math.sin(a) * 7;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath();
    ctx.arc(0, coreY, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Vent lines on sides
    ctx.strokeStyle = '#ff440033';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const vy = torsoTop + 20 + i * 10;
      ctx.beginPath();
      ctx.moveTo(-bodyW/2 - 2, vy);
      ctx.lineTo(-bodyW/2 + 6, vy);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bodyW/2 + 2, vy);
      ctx.lineTo(bodyW/2 - 6, vy);
      ctx.stroke();
    }

    // Shoulder armor (big, angular)
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.translate(side * bodyW/2 * 0.8, shoulderY);
      ctx.fillStyle = '#3a1800';
      ctx.strokeStyle = primary;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(side * -8, -2);
      ctx.lineTo(side * 14, -6);
      ctx.lineTo(side * 16, 4);
      ctx.lineTo(side * 10, 10);
      ctx.lineTo(side * -6, 6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // Accent line on pad
      ctx.strokeStyle = '#ff880044';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(side * -2, 0);
      ctx.lineTo(side * 12, -2);
      ctx.stroke();
      ctx.restore();
    }
  }
  ctx.restore();

  // ════════════════════════════════════
  //  ARMS
  // ════════════════════════════════════
  const armW = isNova ? 6 : 11;
  const fistR = isNova ? 5 : 8;

  // Calculate arm positions
  let baX = f * -22, baY = shoulderY + 28;
  let faX = f * 22, faY = shoulderY + 22;
  let baElbowX = f * -18, baElbowY = shoulderY + 14;
  let faElbowX = f * 16, faElbowY = shoulderY + 12;

  if (state === 'block') {
    faX = f * 14; faY = shoulderY + 6;
    faElbowX = f * 16; faElbowY = shoulderY + 2;
    baX = f * -8; baY = shoulderY + 8;
    baElbowX = f * -10; baElbowY = shoulderY + 4;
  }
  if (state === 'punch') {
    if (progress < 0.3) {
      const p = progress / 0.3;
      faElbowX = f * lerp(16, -5, p);
      faElbowY = shoulderY + lerp(12, 5, p);
      faX = f * lerp(22, -8, p);
      faY = shoulderY + lerp(22, 8, p);
    } else if (progress < 0.55) {
      const p = (progress - 0.3) / 0.25;
      const ep = ease(p);
      faElbowX = f * lerp(-5, 30, ep);
      faElbowY = shoulderY + lerp(5, -2, ep);
      faX = f * lerp(-8, armLen + 38, ep);
      faY = shoulderY + lerp(8, -3, ep);
    } else {
      const p = (progress - 0.55) / 0.45;
      faElbowX = f * lerp(30, 16, p);
      faElbowY = shoulderY + lerp(-2, 12, p);
      faX = f * lerp(armLen + 38, 22, p);
      faY = shoulderY + lerp(-3, 22, p);
    }
  }
  if (state === 'special1' && !isNova && progress > 0.3 && progress < 0.6) {
    const p = (progress - 0.3) / 0.3;
    faX = f * lerp(22, 35, p);
    faY = shoulderY + lerp(22, 60 + crouchOff, ease(p));
    faElbowX = f * lerp(16, 28, p);
    faElbowY = shoulderY + lerp(12, 40, p);
  }
  if (state === 'special1' && isNova && progress > 0.2 && progress < 0.45) {
    const p = (progress - 0.2) / 0.25;
    faX = f * lerp(22, armLen + 30, ease(p));
    faY = shoulderY + lerp(22, 2, p);
    faElbowX = f * lerp(16, armLen * 0.6, p);
    faElbowY = shoulderY + lerp(12, 4, p);
  }
  if (state === 'special2' && !isNova && progress > 0.25 && progress < 0.6) {
    const p = (progress - 0.25) / 0.35;
    faX = f * lerp(22, 12, p);
    faY = shoulderY + lerp(22, -armLen - 25, ease(p));
    faElbowX = f * lerp(16, 10, p);
    faElbowY = shoulderY + lerp(12, -armLen * 0.5, p);
  }
  if (state === 'hit') {
    faX = -f * 15; faY = shoulderY + 32;
    faElbowX = -f * 5; faElbowY = shoulderY + 20;
    baX = -f * 20; baY = shoulderY + 35;
  }

  // Back arm
  const baFill = isNova ? '#003844' : '#2a1000';
  drawLimb(f * -bodyW/2 * 0.5, shoulderY + 2, baElbowX, baElbowY, armW - 1, baFill, secondary, isNova ? 2.5 : 4);
  drawLimb(baElbowX, baElbowY, baX, baY, armW - 1, baFill, secondary, fistR - 1);

  // Front arm
  const faFill = isNova ? '#004d5e' : '#3a1500';
  drawLimb(f * bodyW/2 * 0.5, shoulderY + 2, faElbowX, faElbowY, armW, faFill, primary, isNova ? 3 : 5);
  drawLimb(faElbowX, faElbowY, faX, faY, armW, faFill, primary, fistR);

  // Fist / weapon effects
  if (state === 'punch' && progress > 0.2 && progress < 0.6) {
    ctx.save();
    ctx.shadowBlur = 25;
    ctx.shadowColor = primary;
    ctx.beginPath();
    ctx.arc(faX, faY, fistR + 4, 0, Math.PI * 2);
    ctx.fillStyle = primary + '88';
    ctx.fill();
    // Impact ring
    if (progress > 0.35 && progress < 0.5) {
      ctx.beginPath();
      ctx.arc(faX + f * 5, faY, fistR + 8, 0, Math.PI * 2);
      ctx.strokeStyle = primary;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.restore();
  }

  // Nova: energy blade on wrist (always visible, brighter during attacks)
  if (isNova) {
    const bladeAlpha = (state === 'punch' || state === 'special2') ? 0.8 : 0.25;
    const bladeLen = (state === 'punch' && progress > 0.25 && progress < 0.55) ? 18 : 8;
    ctx.save();
    ctx.globalAlpha = bladeAlpha;
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#00f0ff';
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(faX, faY);
    ctx.lineTo(faX + f * bladeLen, faY - 3);
    ctx.stroke();
    ctx.restore();
  }

  // Titan: power gauntlets glow
  if (!isNova) {
    const gAlpha = (state === 'punch' || state === 'special1') ? 0.7 : 0.2;
    ctx.save();
    ctx.globalAlpha = gAlpha;
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#ff6600';
    ctx.beginPath();
    ctx.arc(faX, faY, fistR + 2, 0, Math.PI * 2);
    ctx.strokeStyle = '#ff8800';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  // ════════════════════════════════════
  //  HEAD
  // ════════════════════════════════════
  const headY = torsoTop - headR - 2 + lean * 0.4;

  if (isNova) {
    // ── NOVA HEAD: sleek helmet, thin V-visor, antenna ──
    // Helmet base
    ctx.beginPath();
    ctx.ellipse(0, headY, headR * 0.88, headR * 1.05, 0, 0, Math.PI * 2);
    const hGrad = ctx.createRadialGradient(0, headY - 4, 2, 0, headY, headR);
    hGrad.addColorStop(0, '#005566');
    hGrad.addColorStop(1, '#002833');
    ctx.fillStyle = hGrad;
    ctx.fill();
    ctx.strokeStyle = '#00ccdd';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Chin guard — slight point
    ctx.beginPath();
    ctx.moveTo(-6, headY + headR * 0.6);
    ctx.lineTo(0, headY + headR * 1.1);
    ctx.lineTo(6, headY + headR * 0.6);
    ctx.fillStyle = '#003344';
    ctx.fill();
    ctx.strokeStyle = '#00bbcc88';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // V-shaped visor
    ctx.save();
    ctx.shadowBlur = 14;
    ctx.shadowColor = '#00f0ff';
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(-headR * 0.7, headY - 2);
    ctx.lineTo(0, headY + 3);
    ctx.lineTo(headR * 0.7, headY - 2);
    ctx.stroke();
    // Visor glow fill
    ctx.fillStyle = '#00f0ff22';
    ctx.fill();
    ctx.restore();

    // Top antenna / fin
    ctx.strokeStyle = '#00ccdd88';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, headY - headR * 0.9);
    ctx.lineTo(0, headY - headR * 1.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, headY - headR * 1.5, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,240,255,${0.5 + Math.sin(time * 4) * 0.3})`;
    ctx.fill();

  } else {
    // ── TITAN HEAD: blocky helmet, wide T-visor, jaw guard ──
    // Helmet — angular, wider
    ctx.beginPath();
    ctx.moveTo(-headR * 0.9, headY + headR * 0.5);
    ctx.lineTo(-headR, headY - headR * 0.3);
    ctx.lineTo(-headR * 0.7, headY - headR * 0.9);
    ctx.lineTo(headR * 0.7, headY - headR * 0.9);
    ctx.lineTo(headR, headY - headR * 0.3);
    ctx.lineTo(headR * 0.9, headY + headR * 0.5);
    ctx.lineTo(headR * 0.6, headY + headR * 0.8);
    ctx.lineTo(-headR * 0.6, headY + headR * 0.8);
    ctx.closePath();
    const hGrad = ctx.createLinearGradient(0, headY - headR, 0, headY + headR);
    hGrad.addColorStop(0, '#3a1800');
    hGrad.addColorStop(1, '#1a0a00');
    ctx.fillStyle = hGrad;
    ctx.fill();
    ctx.strokeStyle = '#cc5500';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Jaw guard plate
    ctx.beginPath();
    ctx.moveTo(-headR * 0.7, headY + headR * 0.15);
    ctx.lineTo(-headR * 0.6, headY + headR * 0.8);
    ctx.lineTo(headR * 0.6, headY + headR * 0.8);
    ctx.lineTo(headR * 0.7, headY + headR * 0.15);
    ctx.closePath();
    ctx.fillStyle = '#2a1200';
    ctx.fill();
    ctx.strokeStyle = '#ff660033';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // T-shaped visor
    ctx.save();
    ctx.shadowBlur = 16;
    ctx.shadowColor = '#ff4400';
    // Horizontal bar
    ctx.fillStyle = '#ff4400';
    ctx.fillRect(-headR * 0.7, headY - headR * 0.35, headR * 1.4, 4);
    // Vertical bar
    ctx.fillRect(-2.5, headY - headR * 0.35, 5, headR * 0.5);
    // Bright center
    ctx.fillStyle = '#ffaa44';
    ctx.fillRect(-headR * 0.5, headY - headR * 0.3, headR * 1.0, 2.5);
    ctx.restore();

    // Side vents on helmet
    ctx.strokeStyle = '#ff440033';
    ctx.lineWidth = 1;
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(side * headR * 0.85, headY - headR * 0.1);
      ctx.lineTo(side * headR * 0.85, headY + headR * 0.2);
      ctx.stroke();
    }

    // Forehead crest
    ctx.strokeStyle = '#ff6600';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-headR * 0.3, headY - headR * 0.85);
    ctx.lineTo(0, headY - headR * 1.1);
    ctx.lineTo(headR * 0.3, headY - headR * 0.85);
    ctx.stroke();
  }

  // ════════════════════════════════════
  //  BLOCK SHIELD EFFECT
  // ════════════════════════════════════
  if (state === 'block') {
    ctx.save();
    ctx.globalAlpha = 0.3 + Math.sin(time * 8) * 0.1;
    ctx.shadowBlur = 20;
    ctx.shadowColor = primary;
    ctx.strokeStyle = primary;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(f * 15, (torsoTop + torsoBot) / 2, 25, bodyH * 0.4, 0, -Math.PI * 0.4, Math.PI * 0.4);
    ctx.stroke();
    ctx.restore();
  }

  // ════════════════════════════════════
  //  KO STATE
  // ════════════════════════════════════
  if (state === 'ko' && progress > 0.3) {
    ctx.globalAlpha = 0.5 + Math.sin(animTimer * 0.5) * 0.3;
    for (let i = 0; i < 4; i++) {
      const sx = rand(-bodyW, bodyW);
      const sy = rand(torsoTop - 10, 5);
      ctx.save();
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#ffffff';
      ctx.fillStyle = primary;
      ctx.beginPath();
      // Spark lines instead of just dots
      const sa = rand(0, Math.PI * 2);
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + Math.cos(sa) * rand(4, 10), sy + Math.sin(sa) * rand(4, 10));
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }
  }

  ctx.restore();

  // ════════════════════════════════════
  //  SPECIAL MOVE EFFECTS (world space)
  // ════════════════════════════════════

  // Seismic slam ground wave (Titan special1)
  if (!isNova && state === 'special1' && progress > 0.4 && progress < 0.85) {
    const wp = (progress - 0.4) / 0.45;
    ctx.save();
    ctx.globalAlpha = (1 - wp) * 0.8;
    // Multiple expanding rings
    for (let r = 0; r < 3; r++) {
      const rp = clamp(wp - r * 0.08, 0, 1);
      if (rp <= 0) continue;
      const waveR = rp * 180;
      ctx.strokeStyle = r === 0 ? '#ff6600' : '#ff440088';
      ctx.lineWidth = 4 - r * 1.2;
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#ff4400';
      ctx.beginPath();
      ctx.ellipse(x, y, waveR, 12 - r * 3, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Ground crack lines
    ctx.strokeStyle = '#ff880066';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI - Math.PI / 2 + (i % 2 ? 0.2 : -0.2);
      const len = wp * 120;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + Math.cos(angle) * len, y + Math.sin(angle) * len * 0.15);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Neon blade slash arc (Nova special2)
  if (isNova && state === 'special2' && progress > 0.25 && progress < 0.7) {
    const tp = (progress - 0.25) / 0.45;
    ctx.save();
    ctx.globalAlpha = 0.8 * (1 - tp * 0.6);
    ctx.shadowBlur = 30;
    ctx.shadowColor = '#00f0ff';
    // Sweeping arc
    const arcR = 70;
    const startAngle = -Math.PI * 0.6;
    const endAngle = startAngle + tp * Math.PI * 1.2;
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x + f * 30, y - bodyH * 0.4, arcR, f > 0 ? startAngle : Math.PI - endAngle, f > 0 ? endAngle : Math.PI - startAngle);
    ctx.stroke();
    // Blade tip glow
    const tipAngle = f > 0 ? endAngle : Math.PI - startAngle;
    const tipX = x + f * 30 + Math.cos(tipAngle) * arcR;
    const tipY = y - bodyH * 0.4 + Math.sin(tipAngle) * arcR;
    ctx.beginPath();
    ctx.arc(tipX, tipY, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff88';
    ctx.fill();
    ctx.restore();
  }

  // Rocket uppercut flame trail (Titan special2)
  if (!isNova && state === 'special2' && progress > 0.25 && progress < 0.7) {
    ctx.save();
    const tp = (progress - 0.25) / 0.45;
    // Jet flame below character
    for (let i = 0; i < 8; i++) {
      const t2 = tp - i * 0.025;
      if (t2 < 0) continue;
      ctx.globalAlpha = 0.5 * (1 - i * 0.11);
      const flameR = (12 - i * 1.2) * (1 + Math.sin(time * 20 + i) * 0.3);
      ctx.beginPath();
      ctx.arc(x + rand(-4, 4), y + 5 + i * 10, flameR, 0, Math.PI * 2);
      const colors = ['#ffcc00', '#ff8800', '#ff4400', '#ff2200'];
      ctx.fillStyle = colors[Math.min(i, 3)];
      ctx.fill();
    }
    // Smoke wisps
    ctx.globalAlpha = 0.15;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(x + rand(-15, 15), y + 30 + i * 15, rand(8, 16), 0, Math.PI * 2);
      ctx.fillStyle = '#664422';
      ctx.fill();
    }
    ctx.restore();
  }
}

// ═══════════════════════════════════════
//  RENDERING — PROJECTILES
// ═══════════════════════════════════════
function drawProjectiles() {
  for (const p of projectiles) {
    ctx.save();
    ctx.translate(p.x, p.y);
    // Core
    ctx.shadowBlur = 20;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, 18, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    // Inner bright
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Trail
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = p.color;
    for (let i = 1; i < 5; i++) {
      ctx.beginPath();
      ctx.ellipse(-p.vx * i * 1.5, 0, 12 - i * 2, 5 - i, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Spawn trail particles
    if (Math.random() > 0.6) {
      spawnParticle(p.x - p.vx + rand(-5,5), p.y + rand(-5,5),
        -p.vx * 0.2 + rand(-1,1), rand(-1,1), p.color, 10, rand(1,3), 6);
    }
  }
}

// ═══════════════════════════════════════
//  RENDERING — PARTICLES
// ═══════════════════════════════════════
function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = p.glow;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════
//  RENDERING — HUD
// ═══════════════════════════════════════
function drawHUD(p1, p2, timer, roundNum) {
  ctx.save();
  // Reset transform to screen space
  ctx.setTransform(scale, 0, 0, scale, offX, offY);

  const barW = 380, barH = 28, barY = 32, gap = 50;
  const centerX = VW / 2;

  // Health bars background
  ctx.fillStyle = '#111122';
  ctx.strokeStyle = '#334466';
  ctx.lineWidth = 2;

  // P1 bar (left, fills right to left)
  const p1barX = centerX - gap - barW;
  ctx.fillRect(p1barX, barY, barW, barH);
  ctx.strokeRect(p1barX, barY, barW, barH);

  // P2 bar (right, fills left to right)
  const p2barX = centerX + gap;
  ctx.fillRect(p2barX, barY, barW, barH);
  ctx.strokeRect(p2barX, barY, barW, barH);

  // P1 health fill (depletes from left)
  const p1fill = clamp(p1.displayHP / p1.maxHP, 0, 1);
  if (p1fill > 0) {
    const grad1 = ctx.createLinearGradient(p1barX, 0, p1barX + barW, 0);
    grad1.addColorStop(0, '#003366');
    grad1.addColorStop(0.5, '#00ccff');
    grad1.addColorStop(1, '#00f0ff');
    ctx.fillStyle = grad1;
    ctx.fillRect(p1barX + barW * (1 - p1fill), barY + 2, barW * p1fill - 2, barH - 4);
    // Bright edge
    ctx.fillStyle = '#ffffff44';
    ctx.fillRect(p1barX + barW * (1 - p1fill), barY + 2, 3, barH - 4);
  }

  // P2 health fill (depletes from right)
  const p2fill = clamp(p2.displayHP / p2.maxHP, 0, 1);
  if (p2fill > 0) {
    const grad2 = ctx.createLinearGradient(p2barX, 0, p2barX + barW, 0);
    grad2.addColorStop(0, '#ff4400');
    grad2.addColorStop(0.5, '#ff6600');
    grad2.addColorStop(1, '#441100');
    ctx.fillStyle = grad2;
    ctx.fillRect(p2barX + 2, barY + 2, barW * p2fill - 2, barH - 4);
    ctx.fillStyle = '#ffffff44';
    ctx.fillRect(p2barX + barW * p2fill - 3, barY + 2, 3, barH - 4);
  }

  // Character names
  ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillStyle = '#00f0ff';
  ctx.textAlign = 'left';
  ctx.fillText('NOVA', p1barX, barY - 4);
  ctx.fillStyle = '#ff6600';
  ctx.textAlign = 'right';
  ctx.fillText('TITAN', p2barX + barW, barY - 4);

  // Round indicators
  ctx.textAlign = 'center';
  for (let i = 0; i < WINS_NEEDED; i++) {
    // P1 wins
    ctx.beginPath();
    ctx.arc(centerX - 20 - i * 18, barY + barH/2, 5, 0, Math.PI * 2);
    ctx.fillStyle = i < p1.wins ? '#00f0ff' : '#333355';
    ctx.shadowBlur = i < p1.wins ? 8 : 0;
    ctx.shadowColor = '#00f0ff';
    ctx.fill();

    // P2 wins
    ctx.beginPath();
    ctx.arc(centerX + 20 + i * 18, barY + barH/2, 5, 0, Math.PI * 2);
    ctx.fillStyle = i < p2.wins ? '#ff4400' : '#553333';
    ctx.shadowBlur = i < p2.wins ? 8 : 0;
    ctx.shadowColor = '#ff4400';
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Timer
  ctx.font = 'bold 38px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(String(Math.ceil(timer)).padStart(2, '0'), centerX, barY - 8);

  // Round label
  ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#667799';
  ctx.fillText(`ROUND ${roundNum}`, centerX, barY + barH + 6);

  ctx.restore();
}

// ═══════════════════════════════════════
//  RENDERING — TOUCH CONTROLS
// ═══════════════════════════════════════
function drawTouchControls() {
  ctx.save();
  // Draw in actual screen coordinates
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const sw = window.innerWidth, sh = window.innerHeight;

  const activeSet = new Set(activeTouches.values());

  for (const [name, btn] of Object.entries(TOUCH_BUTTONS)) {
    const bx = btn.cx * sw;
    const by = btn.cy * sh;
    const br = btn.r * sh;
    const isActive = activeSet.has(name);
    const color = btn.color || '#4488bb';

    ctx.beginPath();
    ctx.arc(bx, by, br, 0, Math.PI * 2);
    ctx.fillStyle = isActive ? color + '55' : '#11223344';
    ctx.fill();
    ctx.strokeStyle = isActive ? color : color + '66';
    ctx.lineWidth = isActive ? 3 : 1.5;
    ctx.stroke();

    if (isActive) {
      ctx.shadowBlur = 15;
      ctx.shadowColor = color;
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Label
    ctx.font = `bold ${br * 0.6}px "Segoe UI", system-ui, sans-serif`;
    ctx.fillStyle = isActive ? '#ffffff' : '#aabbcc88';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(btn.label, bx, by);
  }

  ctx.restore();
}

// ═══════════════════════════════════════
//  RENDERING — OVERLAYS
// ═══════════════════════════════════════
function drawTitleScreen() {
  ctx.save();
  ctx.setTransform(scale, 0, 0, scale, offX, offY);

  // Background darken
  ctx.fillStyle = '#06060ecc';
  ctx.fillRect(0, 0, VW, VH);

  // Title
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.shadowBlur = 40;
  ctx.shadowColor = '#00f0ff';
  ctx.font = 'bold 90px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#00f0ff';
  ctx.fillText('NEON', VW/2, VH/2 - 70);

  ctx.shadowColor = '#ff4400';
  ctx.fillStyle = '#ff4400';
  ctx.fillText('CLASH', VW/2, VH/2 + 30);

  ctx.shadowBlur = 0;
  ctx.font = '22px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#667799';
  const blink = Math.sin(Date.now() * 0.004) > 0;
  if (blink) ctx.fillText('TAP TO FIGHT', VW/2, VH/2 + 120);

  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#445566';
  ctx.fillText('NOVA vs TITAN  •  Best of 3 Rounds', VW/2, VH/2 + 160);

  // Controls hint
  ctx.fillStyle = '#334455';
  ctx.font = '13px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('D-Pad: Move/Jump/Crouch  |  P: Punch  K: Kick  B: Block  |  ↓+P / ↓+K: Special', VW/2, VH - 40);

  ctx.restore();
}

function drawRoundIntro(text, progress) {
  ctx.save();
  ctx.setTransform(scale, 0, 0, scale, offX, offY);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const s = 0.5 + ease(Math.min(progress * 2, 1)) * 0.5;
  const alpha = progress < 0.8 ? 1 : 1 - (progress - 0.8) / 0.2;

  ctx.globalAlpha = alpha;
  ctx.font = `bold ${64 * s}px "Segoe UI", system-ui, sans-serif`;
  ctx.shadowBlur = 30;
  ctx.shadowColor = '#ffffff';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, VW/2, VH/2);
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawMatchEnd(winner) {
  ctx.save();
  ctx.setTransform(scale, 0, 0, scale, offX, offY);

  ctx.fillStyle = '#06060eaa';
  ctx.fillRect(0, 0, VW, VH);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const color = winner.isNova ? '#00f0ff' : '#ff4400';
  ctx.shadowBlur = 30;
  ctx.shadowColor = color;
  ctx.font = 'bold 56px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = color;
  ctx.fillText(`${winner.name} WINS`, VW/2, VH/2 - 30);

  ctx.shadowBlur = 0;
  ctx.font = '24px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#667799';
  const blink = Math.sin(Date.now() * 0.004) > 0;
  if (blink) ctx.fillText('TAP TO PLAY AGAIN', VW/2, VH/2 + 40);

  ctx.restore();
}

// ═══════════════════════════════════════
//  GAME STATE MACHINE
// ═══════════════════════════════════════
let gameState = 'TITLE';
let stateTimer = 0;
let roundNum = 1;
let roundTimer = ROUND_TIME;
let timerAccum = 0;
let roundText = '';

let p1, p2;

function initGame() {
  p1 = createCharacter(true, 350, 1);   // Nova on left
  p2 = createCharacter(false, 930, -1); // Titan on right
}

function startRound() {
  resetCharacter(p1, 350, 1);
  resetCharacter(p2, 930, -1);
  roundTimer = ROUND_TIME;
  timerAccum = 0;
  projectiles.length = 0;
  particles.length = 0;
  hitstopTimer = 0;
  screenShake = { x: 0, y: 0, intensity: 0 };
  camera.x = VW/2; camera.y = VH/2; camera.zoom = 1;
  AI.decision = 'idle'; AI.timer = 30;
  gameState = 'INTRO';
  stateTimer = 0;
  roundText = `ROUND ${roundNum}`;
}

function startMatch() {
  roundNum = 1;
  p1.wins = 0;
  p2.wins = 0;
  startRound();
}

function endRound(winner) {
  if (winner) {
    winner.wins++;
  }
  gameState = 'ROUND_END';
  stateTimer = 0;
  if (winner) {
    roundText = winner.isNova ? 'NOVA WINS' : 'TITAN WINS';
  } else {
    roundText = 'DRAW';
  }
}

// ═══════════════════════════════════════
//  MAIN GAME LOOP
// ═══════════════════════════════════════
let lastTime = 0;
let accumulator = 0;
const FIXED_DT = 1000 / 60;

// Ambient background particles — dust, embers, energy motes
const bgParticles = [];
for (let i = 0; i < 50; i++) {
  const type = Math.random();
  bgParticles.push({
    x: rand(-100, VW + 100), y: rand(-50, VH + 50),
    vx: rand(-0.4, 0.4), vy: rand(-0.6, -0.05),
    size: type > 0.7 ? rand(1.5, 4) : rand(0.5, 2),
    alpha: type > 0.7 ? rand(0.15, 0.35) : rand(0.05, 0.15),
    color: type > 0.8 ? '#00f0ff' : type > 0.6 ? '#ff6600' : type > 0.4 ? '#8844cc' : '#334466',
    drift: rand(0.5, 2),   // sinusoidal drift amplitude
    driftSpeed: rand(0.5, 1.5),
    phase: rand(0, Math.PI * 2),
  });
}

function updateBgParticles() {
  const t = Date.now() * 0.001;
  for (const p of bgParticles) {
    p.x += p.vx + Math.sin(t * p.driftSpeed + p.phase) * p.drift * 0.03;
    p.y += p.vy;
    if (p.y < -20) { p.y = VH + 20; p.x = rand(-100, VW + 100); }
    if (p.x < -120) p.x = VW + 100;
    if (p.x > VW + 120) p.x = -100;
  }
}

function drawBgParticles() {
  const t = Date.now() * 0.001;
  for (const p of bgParticles) {
    const flickerAlpha = p.alpha * (0.7 + Math.sin(t * 3 + p.phase) * 0.3);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = flickerAlpha;
    ctx.fill();
    // Subtle glow on larger particles
    if (p.size > 2.5) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = flickerAlpha * 0.15;
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function gameLoop(now) {
  requestAnimationFrame(gameLoop);

  const dt = Math.min(now - lastTime, 50);
  lastTime = now;
  accumulator += dt;

  // Fixed timestep updates
  while (accumulator >= FIXED_DT) {
    accumulator -= FIXED_DT;
    update();
  }

  render();
}

function update() {
  // Input buffer: holds attack intent for 8 frames so rapid taps and
  // mid-recovery inputs aren't lost
  const BUFFER = 8;
  if (input.punch && !prevPunch) input.punchBuffer = BUFFER;
  if (input.kick && !prevKick) input.kickBuffer = BUFFER;
  pollKeyboard();
  if (!prevPunch && input.punch) input.punchBuffer = BUFFER;
  if (!prevKick && input.kick) input.kickBuffer = BUFFER;
  input.punchPressed = input.punchBuffer > 0;
  input.kickPressed = input.kickBuffer > 0;
  if (input.punchBuffer > 0) input.punchBuffer--;
  if (input.kickBuffer > 0) input.kickBuffer--;

  updateBgParticles();

  switch (gameState) {
    case 'TITLE':
      // Wait for tap
      if (input.punch || input.kick || input.block || input.up ||
          Object.values(keys).some(v => v)) {
        startMatch();
      }
      break;

    case 'INTRO':
      stateTimer++;
      if (stateTimer > 90) {
        gameState = 'FIGHT';
        roundText = 'FIGHT!';
        stateTimer = 0;
      }
      break;

    case 'FIGHT':
      if (hitstopTimer > 0) { hitstopTimer--; break; }

      // Timer
      timerAccum++;
      if (timerAccum >= 60) {
        timerAccum = 0;
        roundTimer--;
        if (roundTimer <= 0) {
          roundTimer = 0;
          // Time out — whoever has more health wins
          if (p1.hp > p2.hp) endRound(p1);
          else if (p2.hp > p1.hp) endRound(p2);
          else endRound(null);
          break;
        }
      }

      // Fight text fade
      if (stateTimer < 40) stateTimer++;

      // Get AI input
      const aiInput = getAIInput(p2, p1);

      // Update characters
      updateCharacter(p1, input, p2);
      updateCharacter(p2, aiInput, p1);

      // Check hitboxes — P1 attacks
      const atkStates = ['punch','kick','air_punch','air_kick','special1','special2'];
      if (atkStates.includes(p1.state) && !p1.hasHit) {
        const hitbox = getHitbox(p1);
        if (hitbox) {
          const hurtbox = getHurtbox(p2);
          if (rectsOverlap(hitbox, hurtbox)) {
            p1.hasHit = true;
            const atk = p1.attacks[p1.state];
            applyHit(p2, atk.damage, p1.facing, p1);
          }
        }
      }
      // P2 attacks
      if (atkStates.includes(p2.state) && !p2.hasHit) {
        const hitbox = getHitbox(p2);
        if (hitbox) {
          const hurtbox = getHurtbox(p1);
          if (rectsOverlap(hitbox, hurtbox)) {
            p2.hasHit = true;
            const atk = p2.attacks[p2.state];
            applyHit(p1, atk.damage, p2.facing, p2);
          }
        }
      }

      // Update projectiles
      updateProjectiles(p1, p2);

      // Update particles
      updateParticles();

      // Update camera
      updateCamera(p1, p2);

      // Check KO
      if (p1.state === 'ko' && p1.grounded && p1.animTimer > 50) {
        endRound(p2);
      }
      if (p2.state === 'ko' && p2.grounded && p2.animTimer > 50) {
        endRound(p1);
      }
      break;

    case 'ROUND_END':
      stateTimer++;
      updateParticles();

      if (stateTimer > 120) {
        // Check match winner
        if (p1.wins >= WINS_NEEDED) {
          gameState = 'MATCH_END'; stateTimer = 0;
        } else if (p2.wins >= WINS_NEEDED) {
          gameState = 'MATCH_END'; stateTimer = 0;
        } else {
          roundNum++;
          startRound();
        }
      }
      break;

    case 'MATCH_END':
      stateTimer++;
      if (stateTimer > 60 && (input.punch || input.kick || input.block ||
          Object.values(keys).some(v => v))) {
        gameState = 'TITLE';
      }
      break;
  }

  prevPunch = input.punch;
  prevKick = input.kick;
}

function render() {
  // Clear
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#06060e';
  ctx.fillRect(0, 0, CW, CH);

  if (gameState === 'TITLE') {
    // Draw background at default position
    ctx.setTransform(scale, 0, 0, scale, offX, offY);
    drawBackground(VW/2, VH/2, 1);
    drawBgParticles();
    // Title characters posed
    drawCharacter(createPoseChar(true, 380, FLOOR_Y, 1, 'idle', 0));
    drawCharacter(createPoseChar(false, 900, FLOOR_Y, -1, 'idle', 0));
    drawTitleScreen();
    drawTouchControls();
    return;
  }

  // Game camera transform
  const cx = camera.x, cy = camera.y, z = camera.zoom;
  ctx.setTransform(scale, 0, 0, scale, offX, offY);
  ctx.save();
  ctx.translate(VW/2 + screenShake.x, VH/2 + screenShake.y);
  ctx.scale(z, z);
  ctx.translate(-cx, -cy);

  // Draw world
  drawBackground(cx, cy, z);
  drawBgParticles();
  drawParticles();
  drawProjectiles();

  // Draw characters (back one first)
  if (p1.x <= p2.x) {
    drawCharacter(p1);
    drawCharacter(p2);
  } else {
    drawCharacter(p2);
    drawCharacter(p1);
  }

  ctx.restore();

  // HUD (screen-space)
  if (gameState !== 'TITLE') {
    drawHUD(p1, p2, roundTimer, roundNum);
  }

  // Overlays
  if (gameState === 'INTRO') {
    const p = stateTimer / 90;
    if (p < 0.6) {
      drawRoundIntro(roundText, p / 0.6);
    } else {
      drawRoundIntro('FIGHT!', (p - 0.6) / 0.4);
    }
  }

  if (gameState === 'FIGHT' && stateTimer < 40) {
    drawRoundIntro('FIGHT!', stateTimer / 40);
  }

  if (gameState === 'ROUND_END') {
    const p = Math.min(stateTimer / 60, 1);
    drawRoundIntro(roundText, p);
  }

  if (gameState === 'MATCH_END') {
    const winner = p1.wins >= WINS_NEEDED ? p1 : p2;
    drawMatchEnd(winner);
  }

  // Touch controls always on top
  drawTouchControls();
}

// Helper: create a static character object for title screen rendering
function createPoseChar(isNova, x, y, facing, state, timer) {
  const c = createCharacter(isNova, x, facing);
  c.y = y;
  c.state = state;
  c.animTimer = timer;
  c.animDuration = 999;
  return c;
}

// ═══════════════════════════════════════
//  INITIALIZATION
// ═══════════════════════════════════════
initGame();

// Prevent default touch behaviors globally
document.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// Animate idle characters on title
setInterval(() => {
  // Keep background particles moving even on title
}, 16);

// Start game loop
requestAnimationFrame(gameLoop);

// ═══════════════════════════════════════
//  PWA SERVICE WORKER REGISTRATION
// ═══════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// Generate icons dynamically
function generateIcon(size) {
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const x = c.getContext('2d');
  // Background
  x.fillStyle = '#06060e';
  x.fillRect(0, 0, size, size);
  // N
  x.font = `bold ${size * 0.35}px "Segoe UI", system-ui, sans-serif`;
  x.textAlign = 'center';
  x.textBaseline = 'middle';
  x.shadowBlur = size * 0.08;
  x.shadowColor = '#00f0ff';
  x.fillStyle = '#00f0ff';
  x.fillText('N', size * 0.35, size * 0.48);
  // C
  x.shadowColor = '#ff4400';
  x.fillStyle = '#ff4400';
  x.fillText('C', size * 0.65, size * 0.48);
  // Border glow
  x.shadowBlur = size * 0.04;
  x.shadowColor = '#00f0ff';
  x.strokeStyle = '#00f0ff44';
  x.lineWidth = 2;
  x.strokeRect(4, 4, size - 8, size - 8);
  return c.toDataURL('image/png');
}

// Set apple-touch-icon dynamically
const iconLink = document.querySelector('link[rel="apple-touch-icon"]');
if (iconLink) iconLink.href = generateIcon(180);

</script>
